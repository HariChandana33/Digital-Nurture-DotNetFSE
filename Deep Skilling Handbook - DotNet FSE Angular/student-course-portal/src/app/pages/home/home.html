<!-- Interpolation -->
<h1>{{ portalName }}</h1>
<p>Your one-stop destination to browse courses, manage enrollments, and check your grades.</p>

<div class="stats-row">
  <p>Courses Available: 12</p>
  <p>Enrolled: 3</p>
  <p>GPA: 3.8</p>
</div>

<hr>

<!-- Two-Way Binding -->
<div>
  <input [(ngModel)]="searchTerm" placeholder="Search courses...">
  <p>Searching for: {{ searchTerm }}</p>
</div>

<!-- Property Binding and Event Binding -->
<button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
<p>{{ message }}</p>
